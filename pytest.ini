[pytest]
# pytest configuration for PDF Data Extractor test suite

# Test discovery settings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Logging and output
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Custom markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (test workflow/components together)
    slow: Slow running tests (avoid in CI by default)
    api: API endpoint tests
    extraction: Extraction pipeline tests
    validation: Data validation tests
    deduplication: Deduplication tests
    output: Output writer tests

# Coverage settings (when pytest-cov is used)
# Run with: pytest --cov=src --cov-report=html --cov-report=term

# Minimum Python version
minversion = 3.10

# Timeout for tests (seconds)
# timeout = 300

# Use xfail markers
xfail_strict = true

# Doctest options
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS
