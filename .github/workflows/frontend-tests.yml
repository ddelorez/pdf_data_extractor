name: Frontend Tests

on:
  push:
    branches: [ main, develop, "feature/**" ]
    paths:
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'frontend/vitest.config.js'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'frontend/vitest.config.js'

jobs:
  test:
    name: Frontend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18.x", "20.x"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        run: cd frontend && npm install
      
      - name: Run linting
        run: cd frontend && npm run lint --if-present
        continue-on-error: true
      
      - name: Run tests
        run: cd frontend && npm run test:run -- --reporter=verbose
      
      - name: Generate coverage report
        run: cd frontend && npm run coverage -- --reporter=json --reporter=html
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-node${{ matrix.node-version }}
          fail_ci_if_error: false
      
      - name: Archive coverage reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage-node${{ matrix.node-version }}
          path: frontend/coverage/
          retention-days: 30
      
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-node${{ matrix.node-version }}
          path: frontend/.vitest/
          retention-days: 30

  quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        run: cd frontend && npm install
      
      - name: Check code style
        run: cd frontend && npm run lint --if-present
        continue-on-error: true
