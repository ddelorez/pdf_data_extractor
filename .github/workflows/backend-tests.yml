name: Backend Tests

on:
  push:
    branches: [ main, develop, "feature/**" ]
    paths:
      - 'src/**'
      - 'tests/backend/**'
      - 'routes/**'
      - 'services/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'pytest.ini'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/backend/**'
      - 'routes/**'
      - 'services/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'pytest.ini'

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Run unit tests
        run: uv run pytest tests/backend/unit -v --tb=short
        continue-on-error: false

      - name: Run integration tests
        run: uv run pytest tests/backend/integration -v --tb=short
        continue-on-error: false

      - name: Run all tests with coverage
        run: |
          uv run pytest tests/backend \
            --cov=src \
            --cov=routes \
            --cov=services \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            -v

      - name: Check coverage thresholds
        run: uv run coverage report --fail-under=60
        continue-on-error: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-py${{ matrix.python-version }}
          fail_ci_if_error: false
      
      - name: Archive coverage reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 30
      
      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage.xml', 'utf8');
            const match = coverage.match(/lines-valid="(\d+)" lines-covered="(\d+)"/);
            if (match) {
              const covered = match[2];
              const total = match[1];
              const percent = ((covered / total) * 100).toFixed(2);
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `✅ Backend Coverage: ${percent}% (${covered}/${total} lines)`
              });
            }
        continue-on-error: true
